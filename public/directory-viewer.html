<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <title>Directory</title>
  <link rel="stylesheet" href="/styles.css?v=20260526-growth-teaching-flow-v257">
  <style>
    :root {
      --paper: #f6f0e4;
      --panel: rgba(255, 252, 245, 0.9);
      --ink: #142027;
      --muted: #748078;
      --line: rgba(36, 53, 48, 0.13);
      --accent: #1f7768;
      --danger: #a64a42;
      --pdf: #b54b45;
      --word: #477cb3;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
      margin: 0;
      color: var(--ink);
      background:
        radial-gradient(circle at 14% 6%, rgba(43, 126, 108, 0.12), transparent 30%),
        linear-gradient(180deg, #fbf6ea 0%, var(--paper) 100%);
      font: 16px/1.45 "Aptos", "Microsoft YaHei", "Segoe UI", sans-serif;
      touch-action: pan-y;
      -webkit-text-size-adjust: 100%;
    }

    .shell {
      min-height: 100dvh;
      padding: calc(12px + env(safe-area-inset-top)) 10px calc(18px + env(safe-area-inset-bottom));
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 5;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 10px;
      align-items: center;
      margin: -4px -2px 12px;
      padding: 8px 2px 10px;
      background:
        linear-gradient(180deg, rgba(251, 246, 234, 0.98) 0%, rgba(246, 240, 228, 0.9) 100%);
      backdrop-filter: blur(16px);
    }

    .title {
      min-width: 0;
    }

    h1 {
      margin: 0;
      font-size: 22px;
      line-height: 1.1;
      letter-spacing: -0.02em;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }

    .path {
      margin-top: 5px;
      color: var(--muted);
      font-size: 12px;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }

    .actions {
      display: flex;
      gap: 7px;
      align-items: center;
    }

    button {
      font: inherit;
    }

    .action-button,
    .entry-delete {
      border: 1px solid rgba(31, 119, 104, 0.22);
      border-radius: 999px;
      background: rgba(255, 252, 245, 0.8);
      color: var(--accent);
      font-size: 13px;
      font-weight: 800;
      padding: 9px 12px;
      box-shadow: 0 10px 24px rgba(35, 54, 48, 0.055);
    }

    .action-button.primary {
      background: linear-gradient(145deg, #2d8a79, #1f7768);
      color: #fffaf1;
      border-color: rgba(31, 119, 104, 0.28);
    }

    .entry-delete {
      color: var(--danger);
      border-color: rgba(166, 74, 66, 0.24);
      background: rgba(255, 247, 242, 0.88);
      box-shadow: none;
      padding: 8px 10px;
    }

    .status {
      margin: 18px 0;
      padding: 14px;
      color: var(--muted);
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 18px;
    }

    .list {
      display: grid;
      gap: 9px;
    }

    .entry {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 8px;
      align-items: stretch;
      padding: 0;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 18px;
      box-shadow: 0 10px 24px rgba(35, 54, 48, 0.055);
      overflow: hidden;
    }

    .entry-main {
      display: grid;
      grid-template-columns: 46px minmax(0, 1fr) auto;
      gap: 11px;
      align-items: center;
      min-width: 0;
      padding: 12px;
      color: inherit;
      text-decoration: none;
    }

    .entry-actions {
      display: grid;
      place-items: center;
      padding-right: 10px;
    }

    .icon {
      display: grid;
      place-items: center;
      height: 42px;
      color: #fffaf1;
      background: linear-gradient(150deg, var(--accent), #164f46);
      border-radius: 14px;
      font-size: 11px;
      font-weight: 850;
      letter-spacing: 0.03em;
    }

    .entry.pdf .icon {
      background: linear-gradient(150deg, #c35b52, #84352f);
    }

    .entry.word .icon {
      background: linear-gradient(150deg, #5b8bc1, #315c8d);
    }

    .name {
      min-width: 0;
      font-weight: 760;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }

    .meta {
      margin-top: 3px;
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .chevron {
      color: rgba(20, 32, 39, 0.36);
      font-weight: 850;
    }

    .hidden {
      display: none !important;
    }

    @media (max-width: 520px) {
      h1 {
        font-size: 20px;
      }

      .action-button {
        padding: 8px 10px;
      }

      .entry-main {
        grid-template-columns: 42px minmax(0, 1fr) auto;
        padding: 11px;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <div class="topbar">
      <div class="title">
        <h1 id="title">目录</h1>
        <div id="path" class="path"></div>
      </div>
      <div class="actions">
        <button id="newFolder" class="action-button" type="button">新建</button>
        <button id="uploadButton" class="action-button primary" type="button">上传</button>
        <input id="uploadInput" class="hidden" type="file" multiple>
      </div>
    </div>
    <div id="status" class="status">Loading directory...</div>
    <div id="list" class="list" hidden></div>
  </main>

  <script src="/fixed-viewport.js?v=20260505-1135"></script>
  <script src="/markdown-renderer-client.js?v=20260526-growth-teaching-flow-v257"></script>
  <script src="/app-task-preview-ui.js?v=20260526-growth-teaching-flow-v257"></script>
  <script>
    const params = new URLSearchParams(location.search);
    const key = localStorage.getItem("hermesWebKey") || "";
    const statusEl = document.getElementById("status");
    const listEl = document.getElementById("list");
    const titleEl = document.getElementById("title");
    const pathEl = document.getElementById("path");
    const uploadInput = document.getElementById("uploadInput");
    let currentData = null;

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function headers(extra = {}) {
      return Object.assign(
        { "Content-Type": "application/json" },
        key ? { "X-Hermes-Web-Key": key } : {},
        extra,
      );
    }

    function formatBytes(bytes) {
      const n = Number(bytes || 0);
      if (!n) return "";
      if (n < 1024) return `${n} B`;
      if (n < 1024 * 1024) return `${(n / 1024).toFixed(1)} KB`;
      return `${(n / 1024 / 1024).toFixed(1)} MB`;
    }

    function formatTime(value) {
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return "";
      return date.toLocaleString([], { month: "2-digit", day: "2-digit", hour: "2-digit", minute: "2-digit" });
    }

    function currentDirectoryPayload(extra = {}) {
      const payload = {};
      for (const name of ["threadId", "path", "alias"]) {
        const value = params.get(name);
        if (value) payload[name] = value;
      }
      return Object.assign(payload, extra);
    }

    function currentDirectoryQuery() {
      const query = new URLSearchParams();
      for (const name of ["threadId", "path", "alias"]) {
        const value = params.get(name);
        if (value) query.set(name, value);
      }
      return query;
    }

    async function directoryApi(path, payload) {
      const res = await fetch(path, {
        method: "POST",
        headers: headers(),
        body: JSON.stringify(payload || {}),
      });
      const body = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(body.error || `${res.status} ${res.statusText}`);
      return body;
    }

    function entryKind(entry) {
      if (entry.type === "directory") return "dir";
      const name = String(entry.name || "").toLowerCase();
      const mime = String(entry.mime || "").toLowerCase();
      if (mime.includes("pdf") || name.endsWith(".pdf")) return "pdf";
      if (mime.includes("word") || name.endsWith(".doc") || name.endsWith(".docx")) return "word";
      if (mime.includes("spreadsheet") || mime.includes("excel") || name.endsWith(".xls") || name.endsWith(".xlsx")) return "sheet";
      if (mime.startsWith("text/") || mime.includes("json") || mime.includes("csv") || /\.(txt|csv|json)$/i.test(name)) return "text";
      return "file";
    }

    function entryHref(entry) {
      if (entry.type === "directory") return entry.url;
      const returnUrl = `${location.pathname}${location.search}`;
      const query = new URLSearchParams({
        src: entry.url,
        name: entry.name || "",
        mime: entry.mime || "",
        size: String(entry.size || 0),
        return: returnUrl,
      });
      if (entryKind(entry) === "pdf") return `/pdf-viewer.html?${query.toString()}`;
      return `/file-viewer.html?${query.toString()}`;
    }

    function isPreviewableEntry(entry) {
      if (!entry || entry.type === "directory") return false;
      const name = String(entry.name || "").toLowerCase();
      const mime = String(entry.mime || "").toLowerCase();
      return mime.startsWith("image/")
        || mime.includes("markdown")
        || mime === "text/x-markdown"
        || mime.includes("pdf")
        || mime.includes("word")
        || mime.includes("spreadsheet")
        || mime.includes("excel")
        || mime.includes("vnd.ms-excel")
        || mime.startsWith("text/")
        || mime.includes("json")
        || mime.includes("csv")
        || /\.(png|jpe?g|gif|webp|avif|bmp|heic|heif|md|markdown|pdf|docx?|xlsx?|txt|csv|json)$/i.test(name);
    }

    function entryPreviewHref(entry) {
      return isPreviewableEntry(entry) ? entry.url : entryHref(entry);
    }

    function entryPreviewAttrs(entry) {
      if (!isPreviewableEntry(entry)) return "";
      return ` data-directory-preview-file="1" data-artifact-mime="${escapeHtml(entry.mime || "")}" data-artifact-name="${escapeHtml(entry.name || "file")}" data-artifact-size="${escapeHtml(String(entry.size || 0))}"`;
    }

    function openDirectoryPreviewLink(link) {
      const previews = window.TaskDocumentPreviewUi || {};
      if (previews.isImagePreviewLink?.(link) && previews.openImagePreviewOverlay?.(link)) return true;
      if (previews.isMarkdownPreviewLink?.(link) && previews.openMarkdownPreviewOverlay?.(link)) return true;
      if (previews.isDocumentPreviewLink?.(link) && previews.openDocumentPreviewOverlay?.(link)) return true;
      return false;
    }

    async function loadDirectory() {
      const res = await fetch(`/api/directories/preview?${currentDirectoryQuery().toString()}`, {
        headers: key ? { "X-Hermes-Web-Key": key } : {},
      });
      const body = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(body.error || `${res.status} ${res.statusText}`);
      return body;
    }

    function render(data) {
      currentData = data;
      titleEl.textContent = data.label || "目录";
      pathEl.textContent = data.workspacePath || data.displayPath || data.label || "";
      const entries = data.entries || [];
      statusEl.hidden = false;
      statusEl.textContent = entries.length ? `${entries.length} 个项目` : "目录为空。";
      listEl.hidden = !entries.length;
      listEl.innerHTML = entries.map((entry) => {
        const kind = entryKind(entry);
        const meta = entry.type === "directory"
          ? `Folder | ${formatTime(entry.mtime)}`
          : `${formatBytes(entry.size)} | ${formatTime(entry.mtime)}`;
        return `<div class="entry ${escapeHtml(kind)}">
          <a class="entry-main" href="${escapeHtml(entryPreviewHref(entry))}"${entryPreviewAttrs(entry)}>
            <div class="icon">${escapeHtml(kind === "dir" ? "DIR" : kind.toUpperCase())}</div>
            <div>
              <div class="name">${escapeHtml(entry.name)}</div>
              <div class="meta">${escapeHtml(meta)}</div>
            </div>
            <div class="chevron">›</div>
          </a>
          <div class="entry-actions">
            <button class="entry-delete" type="button" data-delete-path="${escapeHtml(entry.path || "")}" data-delete-name="${escapeHtml(entry.name || "")}" data-delete-type="${escapeHtml(entry.type || "file")}">删除</button>
          </div>
        </div>`;
      }).join("");
    }

    async function reloadDirectory() {
      statusEl.hidden = false;
      statusEl.textContent = "Loading directory...";
      listEl.hidden = true;
      render(await loadDirectory());
    }

    async function createFolder() {
      const name = window.prompt("新建目录名称");
      if (!name || !name.trim()) return;
      statusEl.hidden = false;
      statusEl.textContent = "Creating folder...";
      await directoryApi("/api/directories/create", currentDirectoryPayload({ name: name.trim() }));
      await reloadDirectory();
    }

    function readFileBase64(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => {
          const value = String(reader.result || "");
          resolve(value.includes(",") ? value.split(",").pop() : value);
        };
        reader.onerror = () => reject(reader.error || new Error("File read failed"));
        reader.readAsDataURL(file);
      });
    }

    async function uploadFiles(files) {
      const list = [...files].filter(Boolean);
      if (!list.length) return;
      for (let index = 0; index < list.length; index += 1) {
        const file = list[index];
        statusEl.hidden = false;
        statusEl.textContent = `Uploading ${index + 1}/${list.length}: ${file.name}`;
        await directoryApi("/api/directories/upload", currentDirectoryPayload({
          filename: file.name,
          dataBase64: await readFileBase64(file),
        }));
      }
      uploadInput.value = "";
      await reloadDirectory();
    }

    async function deleteEntry(button) {
      const name = button.dataset.deleteName || "item";
      const type = button.dataset.deleteType || "file";
      const message = type === "directory"
        ? `删除空目录“${name}”？非空目录不会被删除。`
        : `删除文件“${name}”？`;
      if (!window.confirm(message)) return;
      statusEl.hidden = false;
      statusEl.textContent = "Deleting...";
      await directoryApi("/api/directories/delete", {
        threadId: params.get("threadId") || "",
        path: button.dataset.deletePath || "",
      });
      await reloadDirectory();
    }

    document.getElementById("newFolder").addEventListener("click", () => {
      createFolder().catch((err) => {
        statusEl.hidden = false;
        statusEl.textContent = err.message || String(err);
      });
    });
    document.getElementById("uploadButton").addEventListener("click", () => uploadInput.click());
    uploadInput.addEventListener("change", () => {
      uploadFiles(uploadInput.files).catch((err) => {
        statusEl.hidden = false;
        statusEl.textContent = err.message || String(err);
      });
    });
    listEl.addEventListener("click", (event) => {
      const previewLink = event.target.closest("[data-directory-preview-file]");
      if (previewLink && openDirectoryPreviewLink(previewLink)) {
        event.preventDefault();
        event.stopPropagation();
        event.stopImmediatePropagation?.();
        return;
      }
      const button = event.target.closest("[data-delete-path]");
      if (!button) return;
      event.preventDefault();
      event.stopPropagation();
      deleteEntry(button).catch((err) => {
        statusEl.hidden = false;
        statusEl.textContent = err.message || String(err);
      });
    });

    reloadDirectory().catch((err) => {
      statusEl.hidden = false;
      statusEl.textContent = err.message || String(err);
    });
  </script>
</body>
</html>
