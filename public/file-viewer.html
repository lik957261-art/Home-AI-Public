<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <title>File Preview</title>
  <script>
    (function () {
      try {
        var stored = localStorage.getItem("hermesWebTheme") || "system";
        var effective = stored === "dark" || (stored === "system" && window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches) ? "dark" : "light";
        document.documentElement.dataset.theme = stored === "dark" || stored === "light" ? stored : "system";
        document.documentElement.dataset.effectiveTheme = effective;
      } catch (_) {
        document.documentElement.dataset.theme = "system";
      }
    }());
  </script>
  <style>
    :root {
      --paper: #f6f0e4;
      --panel: rgba(255, 252, 245, 0.9);
      --ink: #142027;
      --muted: #748078;
      --line: rgba(36, 53, 48, 0.13);
      --accent: #1f7768;
      --word: #477cb3;
      --code: #f6f8fa;
      --viewer-font-scale: 1;
      --viewer-markdown-font-scale: 1;
      --viewer-font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "PingFang SC", "Aptos", "Microsoft YaHei UI", "Microsoft YaHei", "Segoe UI", sans-serif;
      --hermes-markdown-font-family: var(--viewer-font-family);
    }

    html[data-effective-theme="dark"] {
      color-scheme: dark;
      --paper: #101214;
      --panel: rgba(27, 31, 34, 0.96);
      --ink: #f5f7f6;
      --muted: #b5bec1;
      --line: rgba(236, 241, 240, 0.16);
      --accent: #edf7f7;
      --word: #a9cdec;
      --code: rgba(255, 255, 255, 0.09);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
      min-height: 100%;
      margin: 0;
      color: var(--ink);
      background:
        radial-gradient(circle at 14% 6%, rgba(43, 126, 108, 0.12), transparent 30%),
        linear-gradient(180deg, #fbf6ea 0%, var(--paper) 100%);
      font: calc(16px * var(--viewer-font-scale))/1.45 var(--viewer-font-family);
      overflow: hidden;
      touch-action: pan-y;
      -webkit-text-size-adjust: 100%;
    }

    .shell {
      height: 100dvh;
      min-height: 100dvh;
      overflow-x: hidden;
      overflow-y: auto;
      overscroll-behavior-y: contain;
      -webkit-overflow-scrolling: touch;
      touch-action: pan-y;
      padding: calc(16px + env(safe-area-inset-top)) 14px calc(22px + env(safe-area-inset-bottom));
    }

    .topbar {
      display: none;
    }

    html[data-effective-theme="dark"] body {
      background: var(--paper);
    }

    body.embedded-viewer .viewer-mode-toggle-button,
    body.embedded-viewer .viewer-save-image-button,
    body.embedded-viewer .viewer-done-button {
      display: none;
    }

    .back {
      display: inline-grid;
      place-items: center;
      width: 48px;
      height: 48px;
      color: var(--ink);
      text-decoration: none;
      background: rgba(255, 255, 255, 0.64);
      border: 1px solid var(--line);
      border-radius: 18px;
      box-shadow: 0 10px 24px rgba(35, 54, 48, 0.06);
      font-size: 28px;
      font-weight: 850;
    }

    h1 {
      min-width: 0;
      margin: 0;
      font-size: 23px;
      line-height: 1.15;
      overflow-wrap: anywhere;
    }

    .card {
      padding: 20px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 24px;
      box-shadow: 0 18px 40px rgba(35, 54, 48, 0.08);
    }

    .file-icon {
      width: 74px;
      height: 74px;
      display: grid;
      place-items: center;
      margin-bottom: 16px;
      color: #fffaf1;
      background: linear-gradient(150deg, var(--word), #315c8d);
      border-radius: 20px;
      font-size: 15px;
      font-weight: 860;
      letter-spacing: 0.03em;
    }

    .meta {
      margin-top: 10px;
      color: var(--muted);
      font-size: 14px;
      overflow-wrap: anywhere;
    }

    .actions {
      display: grid;
      gap: 10px;
      margin-top: 22px;
    }

    .button {
      display: grid;
      place-items: center;
      min-height: 48px;
      padding: 12px 16px;
      color: #fffaf1;
      text-decoration: none;
      background: linear-gradient(145deg, var(--accent), #155b50);
      border: 0;
      border-radius: 18px;
      font: inherit;
      font-weight: 820;
      box-shadow: 0 15px 30px rgba(31, 119, 104, 0.20);
    }

    .button.secondary {
      color: var(--ink);
      background: rgba(255, 255, 255, 0.58);
      border: 1px solid var(--line);
      box-shadow: none;
    }

    .note {
      margin-top: 14px;
      color: var(--muted);
      font-size: 13px;
    }

    .viewer-more-button,
    .viewer-mode-toggle-button {
      position: fixed;
      z-index: 5;
      top: calc(10px + env(safe-area-inset-top));
      min-width: 42px;
      min-height: 34px;
      padding: 0 12px 3px;
      color: rgba(20, 32, 39, 0.82);
      background: rgba(255, 252, 245, 0.54);
      border: 1px solid rgba(36, 53, 48, 0.12);
      border-radius: 999px;
      box-shadow: 0 8px 24px rgba(35, 54, 48, 0.10);
      backdrop-filter: blur(14px);
      font-size: 21px;
      font-weight: 860;
      line-height: 1;
    }

    .viewer-more-button {
      right: max(10px, env(safe-area-inset-right));
    }

    .viewer-mode-toggle-button {
      right: calc(max(10px, env(safe-area-inset-right)) + 52px);
      min-width: 94px;
      padding: 0 12px;
      font-size: 13px;
      font-weight: 800;
    }

    .viewer-done-button {
      position: fixed;
      z-index: 5;
      left: max(10px, env(safe-area-inset-left));
      top: calc(10px + env(safe-area-inset-top));
      min-width: 54px;
      min-height: 34px;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 0 14px;
      color: rgba(255, 255, 255, 0.92);
      background: rgba(15, 23, 42, 0.46);
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 999px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.24);
      backdrop-filter: blur(14px);
      font: 760 calc(14px * var(--viewer-font-scale))/1.1 var(--viewer-font-family);
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }

    html[data-effective-theme="dark"] .back,
    html[data-effective-theme="dark"] .button.secondary,
    html[data-effective-theme="dark"] .viewer-more-button,
    html[data-effective-theme="dark"] .viewer-mode-toggle-button {
      color: var(--ink);
      background: rgba(255, 255, 255, 0.12);
      border-color: var(--line);
      box-shadow: none;
    }

    .viewer-save-image-button {
      position: fixed;
      z-index: 5;
      left: 50%;
      bottom: calc(18px + env(safe-area-inset-bottom));
      display: none;
      transform: translateX(-50%);
      min-height: 42px;
      max-width: calc(100vw - 56px);
      padding: 0 18px;
      color: rgba(255, 255, 255, 0.94);
      background: rgba(15, 23, 42, 0.54);
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 999px;
      box-shadow: 0 10px 28px rgba(0, 0, 0, 0.28);
      backdrop-filter: blur(14px);
      font: 820 calc(14px * var(--viewer-font-scale))/1.1 var(--viewer-font-family);
      white-space: nowrap;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }

    .viewer-toast {
      position: fixed;
      z-index: 30;
      left: 50%;
      bottom: calc(18px + env(safe-area-inset-bottom));
      transform: translateX(-50%);
      max-width: min(360px, calc(100vw - 28px));
      padding: 8px 12px;
      color: #f8fafc;
      background: rgba(15, 23, 42, 0.72);
      border-radius: 999px;
      backdrop-filter: blur(14px);
      font-size: 13px;
      font-weight: 720;
      text-align: center;
      pointer-events: none;
    }

    .preview {
      width: 100%;
      min-height: 60dvh;
      margin-top: 16px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: var(--panel);
      touch-action: pan-y;
    }

    .preview-panel {
      margin-top: 16px;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: rgba(255, 254, 250, 0.82);
      touch-action: pan-y;
    }

    .preview-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 14px;
      color: var(--muted);
      border-bottom: 1px solid var(--line);
      font-size: 13px;
      font-weight: 760;
    }

    .preview-text {
      max-height: 62dvh;
      overflow: auto;
      padding: 16px;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      color: var(--ink);
      font: calc(15px * var(--viewer-font-scale))/1.72 var(--viewer-font-family);
      overscroll-behavior-y: contain;
      -webkit-overflow-scrolling: touch;
      touch-action: pan-y;
    }

    .preview-text.markdown-preview {
      white-space: normal;
      overflow-wrap: anywhere;
      word-break: normal;
      font-size: calc(15px * var(--viewer-markdown-font-scale));
    }

    .markdown-preview article,
    .markdown-preview .hermes-markdown-doc {
      max-width: 860px;
      margin: 0 auto;
      color: var(--ink);
      font-family: var(--hermes-markdown-font-family);
      line-height: 1.72;
    }

    .markdown-preview h1,
    .markdown-preview h2,
    .markdown-preview h3,
    .markdown-preview h4 {
      margin: 1.35em 0 0.62em;
      color: var(--ink);
      line-height: 1.25;
      letter-spacing: 0;
      font-weight: 760;
      overflow-wrap: anywhere;
    }

    .markdown-preview h1 {
      margin-top: 0.25em;
      padding-bottom: 0.3em;
      border-bottom: 1px solid var(--line);
      font-size: 1.72em;
    }

    .markdown-preview h2 {
      padding-bottom: 0.3em;
      border-bottom: 1px solid var(--line);
      font-size: 1.36em;
    }

    .markdown-preview h3 {
      font-size: 1.12em;
    }

    .markdown-preview h4 {
      font-size: 1em;
    }

    .markdown-preview p,
    .markdown-preview ul,
    .markdown-preview ol,
    .markdown-preview blockquote,
    .markdown-preview pre,
    .markdown-table-wrap {
      margin: 0.86em 0;
    }

    .markdown-preview p {
      min-width: 0;
      overflow-wrap: anywhere;
    }

    .markdown-preview ul,
    .markdown-preview ol {
      padding-left: 1.45em;
    }

    .markdown-preview ul.task-list,
    .markdown-preview .hermes-markdown-task-list {
      padding-left: 0;
      list-style: none;
    }

    .markdown-preview .task-list-item,
    .markdown-preview .hermes-markdown-task-item {
      display: grid;
      grid-template-columns: 1.25em minmax(0, 1fr);
      gap: 0.42em;
      align-items: start;
    }

    .markdown-preview .task-list-item input,
    .markdown-preview .hermes-markdown-task-checkbox {
      width: 1em;
      height: 1em;
      margin: 0.32em 0 0;
      accent-color: #1f6feb;
    }

    .markdown-preview li + li {
      margin-top: 0.28em;
    }

    .markdown-preview blockquote {
      padding: 0.05em 0 0.05em 1em;
      color: #57606a;
      border-left: 0.25em solid var(--line);
    }

    .markdown-preview code {
      padding: 0.12em 0.35em;
      background: rgba(175, 184, 193, 0.2);
      border-radius: 6px;
      font-family: "Cascadia Code", "SFMono-Regular", Consolas, monospace;
      font-size: 0.88em;
      overflow-wrap: anywhere;
    }

    .markdown-preview pre {
      overflow-x: auto;
      padding: 1em;
      background: var(--code);
      border: 1px solid var(--line);
      border-radius: 8px;
      line-height: 1.55;
      -webkit-overflow-scrolling: touch;
    }

    .markdown-preview pre code {
      padding: 0;
      background: transparent;
      border-radius: 0;
      font-size: 0.9em;
    }

    .markdown-table-wrap,
    .hermes-markdown-table-wrapper {
      max-width: 100%;
      overflow-x: auto;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      -webkit-overflow-scrolling: touch;
      touch-action: pan-x pan-y;
    }

    .markdown-preview table {
      width: 100%;
      border-collapse: collapse;
      overflow-wrap: normal;
      font-size: 0.94em;
      margin: 0;
    }

    .markdown-preview th,
    .markdown-preview td {
      min-width: 0;
      padding: 0.55em 0.65em;
      border: 1px solid var(--line);
      vertical-align: top;
      overflow-wrap: anywhere;
    }

    .markdown-preview th {
      background: var(--code);
      font-weight: 820;
    }

    .markdown-preview tr:nth-child(even) td {
      background: rgba(246, 248, 250, 0.56);
    }

    .markdown-preview a {
      color: #0969da;
      text-decoration: none;
    }

    .markdown-preview a:hover {
      text-decoration: underline;
    }

    @media (max-width: 640px) {
      .markdown-table-wrap,
      .hermes-markdown-table-wrapper {
        overflow: visible;
        border: 0;
        border-radius: 0;
        background: transparent;
        touch-action: pan-y;
      }

      .markdown-preview table,
      .markdown-preview thead,
      .markdown-preview tbody,
      .markdown-preview tr,
      .markdown-preview th,
      .markdown-preview td {
        display: block;
        width: 100%;
      }

      .markdown-preview thead {
        position: absolute;
        width: 1px;
        height: 1px;
        overflow: hidden;
        clip: rect(0 0 0 0);
        white-space: nowrap;
      }

      .markdown-preview tr {
        margin: 0 0 0.82em;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        overflow: hidden;
      }

      .markdown-preview td {
        display: grid;
        grid-template-columns: minmax(5.8em, 34%) minmax(0, 1fr);
        gap: 0.7em;
        align-items: start;
        padding: 0.62em 0.72em;
        border: 0;
        border-bottom: 1px solid #d8dee4;
        overflow-wrap: anywhere;
        word-break: break-word;
      }

      .markdown-preview td:last-child {
        border-bottom: 0;
      }

      .markdown-preview td::before {
        content: attr(data-label);
        color: #57606a;
        font-size: 0.82em;
        font-weight: 780;
        line-height: 1.35;
        overflow-wrap: anywhere;
      }

      .markdown-preview td[data-label=""] {
        grid-template-columns: 1fr;
      }

      .markdown-preview td[data-label=""]::before {
        content: none;
      }
    }

    .markdown-preview hr {
      margin: 1.5em 0;
      border: 0;
      border-top: 1px solid var(--line);
    }

    .preview-status {
      margin-top: 14px;
      padding: 12px 14px;
      color: var(--muted);
      background: rgba(255, 255, 255, 0.45);
      border: 1px solid var(--line);
      border-radius: 16px;
      font-size: 14px;
    }

    .preview-status-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
    }

    .preview-status-actions button,
    .preview-status-actions a {
      min-height: 36px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0 12px;
      color: var(--ink);
      text-decoration: none;
      background: rgba(255, 255, 255, 0.68);
      border: 1px solid var(--line);
      border-radius: 10px;
      font: inherit;
      font-weight: 760;
    }

    .viewer-sheet {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: grid;
      align-items: end;
      background: rgba(15, 23, 42, 0.18);
      backdrop-filter: blur(8px);
    }

    .viewer-sheet-panel {
      width: min(520px, calc(100vw - 24px));
      margin: 0 auto calc(12px + env(safe-area-inset-bottom));
      padding: 16px;
      background: rgba(255, 252, 245, 0.97);
      border: 1px solid rgba(36, 53, 48, 0.12);
      border-radius: 20px;
      box-shadow: 0 18px 44px rgba(15, 23, 42, 0.18);
    }

    .viewer-sheet-title {
      margin: 0 0 4px;
      color: #142027;
      font-size: 17px;
      font-weight: 840;
    }

    .viewer-sheet-note {
      margin: 0 0 12px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .viewer-sheet-actions {
      display: grid;
      gap: 8px;
    }

    .viewer-sheet-actions button {
      min-height: 44px;
      padding: 10px 12px;
      color: #17222b;
      background: rgba(255, 255, 255, 0.74);
      border: 1px solid rgba(36, 53, 48, 0.12);
      border-radius: 14px;
      font: 780 calc(15px * var(--viewer-font-scale))/1.2 var(--viewer-font-family);
      text-align: left;
    }

    .viewer-sheet-actions button.primary {
      color: #fffaf1;
      background: linear-gradient(145deg, var(--accent), #155b50);
      border-color: transparent;
    }

    .viewer-sheet-actions button.subtle {
      color: rgba(20, 32, 39, 0.72);
      background: transparent;
    }

    .viewer-sheet-status {
      min-height: 18px;
      margin: 10px 0 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.4;
    }

    .viewer-sheet-status.error {
      color: #9f1239;
    }

    .viewer-sheet-status.success {
      color: #047857;
    }

    .hidden {
      display: none !important;
    }

    body.text-document-mode {
      background: var(--paper);
      overflow-x: hidden;
    }

    body.office-document-mode {
      color-scheme: light;
      color: #1f2328;
      background: #f3f4f6;
    }

    body.image-document-mode {
      min-height: 100dvh;
      overflow: hidden;
      background: #050607;
      touch-action: pan-y;
    }

    body.text-document-mode .shell {
      height: 100dvh;
      min-height: 100dvh;
      overflow-x: hidden;
      overflow-y: auto;
      padding: 0;
    }

    body.image-document-mode .shell {
      height: 100dvh;
      min-height: 100dvh;
      overflow: hidden;
      padding: 0;
    }

    body.text-document-mode h1,
    body.text-document-mode .file-icon,
    body.text-document-mode .meta,
    body.text-document-mode .actions,
    body.text-document-mode .note {
      display: none;
    }

    body.image-document-mode h1,
    body.image-document-mode .file-icon,
    body.image-document-mode .meta,
    body.image-document-mode .actions,
    body.image-document-mode .note,
    body.image-document-mode .preview,
    body.image-document-mode .preview-panel,
    body.image-document-mode .preview-status {
      display: none;
    }

    body.text-document-mode .card {
      min-height: 100dvh;
      padding: 0;
      background: transparent;
      border: 0;
      border-radius: 0;
      box-shadow: none;
    }

    body.image-document-mode .card {
      min-height: 100dvh;
      padding: 0;
      background: #050607;
      border: 0;
      border-radius: 0;
      box-shadow: none;
    }

    body.image-document-mode .viewer-more-button,
    body.image-document-mode .viewer-mode-toggle-button {
      color: rgba(255, 255, 255, 0.88);
      background: rgba(15, 23, 42, 0.42);
      border-color: rgba(255, 255, 255, 0.18);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.24);
    }

    body.image-document-mode .viewer-done-button {
      display: inline-flex;
    }

    body.image-document-mode .viewer-save-image-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .image-stage {
      display: grid;
      place-items: center;
      width: 100vw;
      height: 100dvh;
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
      background: #050607;
    }

    .image-stage img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: contain;
      object-position: center center;
      user-select: none;
      -webkit-user-drag: none;
    }

    body.text-document-mode .preview-status {
      position: fixed;
      z-index: 3;
      left: 50%;
      top: calc(14px + env(safe-area-inset-top));
      transform: translateX(-50%);
      max-width: min(76vw, 420px);
      margin: 0;
      padding: 10px 14px;
      color: #f8fafc;
      background: rgba(15, 23, 42, 0.88);
      border: 0;
      border-radius: 999px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.22);
      text-align: center;
      backdrop-filter: blur(14px);
    }

    body.text-document-mode .preview-panel {
      min-height: 100dvh;
      margin: 0;
      overflow: visible;
      border: 0;
      border-radius: 0;
      background: var(--paper);
      touch-action: pan-y;
    }

    body.office-document-mode .preview-panel {
      background: #f3f4f6;
    }

    body.text-document-mode .preview-head {
      display: none;
    }

    body.text-document-mode .preview-text {
      max-height: none;
      min-height: 100dvh;
      overflow: visible;
      padding: calc(18px + env(safe-area-inset-top)) max(22px, env(safe-area-inset-left)) calc(32px + env(safe-area-inset-bottom)) max(22px, env(safe-area-inset-right));
      color: var(--ink);
      font: calc(18px * var(--viewer-font-scale))/1.72 var(--viewer-font-family);
      letter-spacing: 0;
      background: var(--paper);
      touch-action: pan-y;
    }

    body.office-document-mode .preview-text {
      max-width: 980px;
      min-height: calc(100dvh - 32px);
      margin: 0 auto;
      color: #1f2328;
      background: #fff;
      box-shadow: 0 8px 28px rgba(15, 23, 42, 0.12);
      white-space: pre-wrap;
      tab-size: 4;
    }

    body.office-document-mode .preview-text * {
      color: inherit;
    }

  <script>

    function viewerFontSizeOption(value) {
      const id = String(value || "").trim();

    function currentViewerPreferences() {

      const prefs = currentViewerPreferences();

    function formatBytes(bytes) {
      const n = Number(bytes || 0);
      if (n < 1024) return `${n} B`;
      if (n < 1024 * 1024) return `${(n / 1024).toFixed(1)} KB`;
      return `${(n / 1024 / 1024).toFixed(1)} MB`;
    }

    function kindFor(name, mime) {
      const lower = String(name || "").toLowerCase();
      const type = String(mime || "").toLowerCase();
      if (type.includes("word") || lower.endsWith(".doc") || lower.endsWith(".docx")) return "DOC";
      if (type.includes("spreadsheet") || type.includes("excel") || lower.endsWith(".xls") || lower.endsWith(".xlsx")) return "SHEET";
      if (type.includes("presentation") || type.includes("powerpoint") || lower.endsWith(".ppt") || lower.endsWith(".pptx")) return "SLIDE";
      if (type.includes("image") || /\.(png|jpe?g|webp|gif)$/i.test(lower)) return "IMG";
      if (type.includes("html") || /\.(html?|xhtml)$/i.test(lower)) return "HTML";
      if (type.includes("markdown") || lower.endsWith(".md")) return "MD";
      if (type.includes("text") || /\.(txt|md|csv|json)$/i.test(lower)) return "TXT";
      return "FILE";
    }

    function isMarkdownDocument() {
      const lower = String(name || "").toLowerCase();
      const type = String(mime || "").toLowerCase();
      return type.includes("markdown") || lower.endsWith(".md");
    }

    function sameOriginUrl(value) {
      try {
        const url = new URL(value, location.origin);
        if (url.origin !== location.origin) return null;
        return url;
      } catch (_) {
        return null;
      }
    }

    function previewUrlFor(value) {
      const url = sameOriginUrl(value);
      if (!url) return "";
      if (url.pathname === "/api/files") {
        return `/api/files/preview?${url.searchParams.toString()}`;
      }
      if (url.pathname === "/api/files/preview") {
        return `/api/files/preview?${url.searchParams.toString()}`;
      }
      if (url.pathname === "/api/automations/output") {
        return `/api/automations/output/preview?${url.searchParams.toString()}`;
      }
      if (url.pathname === "/api/automations/deliverable") {
        return `/api/automations/deliverable/preview?${url.searchParams.toString()}`;
      }
      if (url.pathname === "/api/kanban/cards/output") {
        return `/api/kanban/cards/output/preview?${url.searchParams.toString()}`;
      }
      const artifact = url.pathname.match(/^\/api\/artifacts\/([^/]+)$/);
      if (artifact) {
        return `/api/files/preview?artifactId=${encodeURIComponent(decodeURIComponent(artifact[1]))}`;
      }
      return "";
    }

    function downloadUrlFor(value) {
      const url = sameOriginUrl(value);
      if (!url) return value || "#";
      if (url.pathname === "/api/files/preview") {
        url.pathname = "/api/files";
      }
      url.searchParams.set("download", "1");
      return `${url.pathname}${url.search}${url.hash}`;
    }

    function originalUrlFor(value) {
      const url = sameOriginUrl(value);
      if (!url) return value || "#";
      if (url.pathname === "/api/files/preview") {
        url.pathname = "/api/files";
      }
      return `${url.pathname}${url.search}${url.hash}`;
    }

    function nativeDocumentPreviewRequestId() {
      try {
        if (crypto?.randomUUID) return `native_doc_${crypto.randomUUID()}`;
      } catch (_) {}
      return `native_doc_${Date.now().toString(36)}_${Math.random().toString(36).slice(2, 10)}`;
    }

    function parsedNativeDocumentResult(value) {
      if (!value) return null;
      if (typeof value === "object") return value;
      if (typeof value !== "string") return null;
      try {
        const parsed = JSON.parse(value);
        return parsed && typeof parsed === "object" ? parsed : null;
      } catch (_) {
        return null;
      }
    }

    function nativeDocumentResultForEvent(event) {
      return parsedNativeDocumentResult(event?.detail) || parsedNativeDocumentResult(event?.data) || null;
    }

    function rawAndroidNativeDocumentBridge(target) {
      const raw = target?.HomeAIAndroidNativeDocument || null;
      return raw && typeof raw.open === "function" ? raw : null;
    }

    function rawIosNativeDocumentBridge(target) {
      const handlers = target?.webkit?.messageHandlers || {};
      const handler = handlers.homeAINativeDocument || handlers.HomeAINativeDocument || null;
      return handler && typeof handler.postMessage === "function" ? handler : null;
    }

    function ensureNativeDocumentBridgeForTarget(target) {
      if (!target) return null;
      const capability = target.HomeAINativeDocumentCapability || {};
      const bridge = target.HomeAINativeDocument || {};
      if (capability.documentPreview === true && typeof bridge.open === "function") return bridge;

      const androidBridge = rawAndroidNativeDocumentBridge(target);
      const iosBridge = rawIosNativeDocumentBridge(target);
      if (!androidBridge && !iosBridge) return null;

      const platform = androidBridge ? "android" : "ios";
      target.HomeAINativeDocumentCapability = Object.assign({}, capability, {
        documentPreview: true,
        platform: capability.platform || platform,
        version: capability.version || 1,
      });
      target.HomeAINativeDocument = Object.assign({}, bridge, {
        open(request) {
          const safeRequest = Object.assign({}, request || {});
          if (!safeRequest.requestId) safeRequest.requestId = nativeDocumentPreviewRequestId();
          return new Promise((resolve) => {
            let settled = false;
            let timeoutId = 0;
            const finish = (body) => {
              if (settled) return;
              settled = true;
              if (timeoutId) target.clearTimeout?.(timeoutId);
              target.removeEventListener?.("homeai:native-document-result", onResult);
              const result = parsedNativeDocumentResult(body) || {};
              resolve(Object.assign({ ok: result.ok !== false, requestId: safeRequest.requestId }, result));
            };
            const onResult = (event) => {
              const body = nativeDocumentResultForEvent(event);
              if (!body) return;
              if (body.requestId && body.requestId !== safeRequest.requestId) return;
              finish(body);
            };
            target.addEventListener?.("homeai:native-document-result", onResult);
            timeoutId = target.setTimeout?.(() => {
              finish({ ok: false, requestId: safeRequest.requestId, error: "native_document_result_timeout" });
            }, 15000);
            try {
              const payload = JSON.stringify(safeRequest);
              const immediate = androidBridge
                ? androidBridge.open(payload)
                : iosBridge.postMessage(safeRequest);
              const parsed = parsedNativeDocumentResult(immediate);
              if (parsed && (parsed.ok === false || parsed.ok === true || parsed.error)) finish(parsed);
            } catch (err) {
              finish({ ok: false, requestId: safeRequest.requestId, error: err?.message || "native_document_open_failed" });
            }
          });
        },
      });
      return target.HomeAINativeDocument;
    }

    function nativeDocumentBridgeTarget() {
      const candidates = [window];
      try {
        if (window.parent && window.parent !== window) candidates.push(window.parent);
      } catch (_) {}
      for (const target of candidates) {
        try {
          if (ensureNativeDocumentBridgeForTarget(target)) {
            return target;
          }
        } catch (_) {}
      }
      return null;
    }

    function nativeDocumentBridgeAvailable() {
      return Boolean(nativeDocumentBridgeTarget());
    }

    function nativeDocumentOpenInBridgeTarget() {
      const candidates = [window];
      try {
        if (window.parent && window.parent !== window) candidates.push(window.parent);
      } catch (_) {}
      for (const target of candidates) {
        try {
          const bridge = ensureNativeDocumentBridgeForTarget(target);
          const capability = target?.HomeAINativeDocumentCapability || {};
          if (capability.documentOpenIn === true && bridge && typeof bridge.open === "function") return target;
        } catch (_) {}
      }
      return null;
    }

    function nativeDocumentBridgeExpected() {
      const queryValue = params.get("nativeShell") || "";
      if (queryValue === "ios" || queryValue === "android") return true;
      const root = document.documentElement;
      const datasetValue = root?.dataset?.nativeShell || "";
      if (datasetValue === "ios" || datasetValue === "android") return true;
      try {
        const storedValue = localStorage.getItem("homeAI.nativeShell") || "";
        if (storedValue === "ios" || storedValue === "android") return true;
      } catch (_) {}
      return false;
    }

    function nativeDocumentKindForViewerKind(value) {
      if (value === "DOC") return "word";
      if (value === "SLIDE") return "powerpoint";
      return "";
    }

    function nativeDocumentOpenRequestFromViewer() {
      const nativeKind = nativeDocumentKindForViewerKind(kind);
      if (!src || !nativeKind) return null;
      const openUrl = originalUrlFor(src);
      const url = sameOriginUrl(openUrl);
      if (!url || !url.pathname.startsWith("/api/")) return null;
      return {
        type: "homeai.nativeDocument.open",
        version: 1,
        requestId: nativeDocumentPreviewRequestId(),
        url: `${url.pathname}${url.search}${url.hash}`,
        filename: name || "document",
        mimeType: mime || "",
        kind: nativeKind,
        sourceSurface: "file-viewer",
        requiresAuth: true,
      };
    }

    function nativeDocumentOpenInRequestFromViewer() {
      const request = nativeDocumentOpenRequestFromViewer();
      return request ? Object.assign({}, request, { mode: "openIn" }) : null;
    }

    function shouldUseNativeViewerDocumentPreview() {
      return Boolean(!forceWebPreview && nativeDocumentBridgeAvailable() && nativeDocumentOpenRequestFromViewer());
    }

    function canWaitForNativeViewerDocumentPreview() {
      return Boolean(!forceWebPreview && nativeDocumentOpenRequestFromViewer() && nativeDocumentBridgeExpected());
    }

    function showNativeDocumentPreviewFailure(error = "") {
      document.documentElement.dataset.nativeDocumentStatus = "failed";
      document.body.classList.add("office-document-mode");
      const message = error === "native_document_result_timeout"
        ? "系统预览没有返回结果，请关闭系统预览后重试；如果持续出现，请更新或重启 Home AI 原生壳。"
        : "系统预览桥接不可用。此设备的 Home AI 原生壳没有暴露文档预览桥，重启通常不能修复；请更新原生壳，或使用下方 Web 预览、下载/分享继续查看。";
      previewStatus.classList.remove("hidden");
      previewStatus.replaceChildren();
      const text = document.createElement("span");
      text.textContent = `${message}${error ? ` (${error})` : ""}`;
      const actions = document.createElement("div");
      actions.className = "preview-status-actions";
      const openIn = document.createElement("button");
      openIn.type = "button";
      openIn.textContent = "用其他 App 打开";
      openIn.addEventListener("click", async () => {
        setTransientStatus("正在打开系统打开方式...");
        if (await openNativeDocumentOpenInFromViewer()) return;
        setTransientStatus("系统打开方式不可用，请改用下载或分享。");
      });

      previewStatus.append(text, actions);
      document.getElementById("textPreview").classList.add("hidden");

    function openNativeDocumentPreviewFromViewer(options = {}) {
      if (!shouldUseNativeViewerDocumentPreview()) return false;
      const request = nativeDocumentOpenRequestFromViewer();
      const onFailure = typeof options.onFailure === "function" ? options.onFailure : null;
      const bridgeTarget = nativeDocumentBridgeTarget();
      if (!bridgeTarget) return false;
      const bridge = ensureNativeDocumentBridgeForTarget(bridgeTarget);
      if (!bridge) return false;
      try {
        setStatus("正在打开系统预览...");
        const result = bridge.open(request);
        if (result && typeof result.then === "function") {
          result
            .then((body) => {
              if (body && body.ok === false) onFailure?.(body.error || "native_document_open_failed");
            })
            .catch((err) => onFailure?.(err?.message || "native_document_open_failed"));
          return true;
        }
        if (result && result.ok === false) {
          onFailure?.(result.error || "native_document_open_failed");
          return Boolean(onFailure);
        }
        return true;
      } catch (err) {
        onFailure?.(err?.message || "native_document_open_failed");
        return Boolean(onFailure);
      }
    }

    async function openNativeDocumentOpenInFromViewer() {
      const request = nativeDocumentOpenInRequestFromViewer();
      const bridgeTarget = request ? nativeDocumentOpenInBridgeTarget() : null;
      if (!request || !bridgeTarget) return false;
      const bridge = ensureNativeDocumentBridgeForTarget(bridgeTarget);
      if (!bridge) return false;
      try {
        setTransientStatus("正在打开系统打开方式...");
        const result = await bridge.open(request);
        if (result && result.ok === true) {
          setTransientStatus("");
          return true;
        }
        return false;
      } catch (_) {
        return false;
      }
    }

    function waitForNativeDocumentPreviewFromViewer(options = {}) {
      if (!canWaitForNativeViewerDocumentPreview()) return false;
      if (openNativeDocumentPreviewFromViewer(options)) return true;
      const onFailure = typeof options.onFailure === "function" ? options.onFailure : null;
      const timeoutMs = Number.isFinite(options.timeoutMs) ? Math.max(0, options.timeoutMs) : 1800;
      const startedAt = Date.now();
      setStatus("正在准备系统预览...");
      const retry = () => {
        if (openNativeDocumentPreviewFromViewer(options)) return;
        if (Date.now() - startedAt >= timeoutMs) {
          onFailure?.("native_document_bridge_unavailable");
          return;
        }
        window.setTimeout(retry, 120);
      };
      window.setTimeout(retry, 80);
      return true;
    }

    function absoluteUrlFor(value) {
      try {
        return new URL(value || "#", location.href).href;
      } catch (_) {
        return value || "";
      }
    }

    function safeReturnUrl() {
      const value = String(returnUrl || "").trim();

      try {
        const url = new URL(value, location.origin);
        if (url.origin !== location.origin) return "";
        return `${url.pathname}${url.search}${url.hash}`;
      } catch (_) {
        return "";
      }
    }

    function safeReferrerUrl() {
      const value = String(document.referrer || "").trim();
      if (!value) return "";
      try {
        const url = new URL(value, location.origin);
        if (url.origin !== location.origin) return "";
        return `${url.pathname}${url.search}${url.hash}`;
      } catch (_) {
        return "";
      }
    }

    function appShellRouteForParams(params) {
      const nextParams = new URLSearchParams(params || "");
      if (!nextParams.has("source")) nextParams.set("source", "pwa");
      let shellPath = "/";
      try {
        const referrer = new URL(document.referrer || "/", location.origin);
        if (referrer.origin === location.origin && referrer.pathname && !referrer.pathname.includes(".")) {
          shellPath = referrer.pathname.endsWith("/") ? referrer.pathname : `${referrer.pathname}/`;
        }
      } catch (_) {}
      return `${shellPath}${nextParams.toString() ? `?${nextParams.toString()}` : ""}`;
    }

    function inferredReturnUrlFromSource() {
      const url = sameOriginUrl(src);
      if (!url) return "";
      if (url.pathname === "/api/automations/output" || url.pathname === "/api/automations/deliverable") {
        const workspaceId = String(url.searchParams.get("workspaceId") || "owner").trim() || "owner";
        const jobId = String(url.searchParams.get("jobId") || "").trim();
        const params = new URLSearchParams({ view: "automation", workspaceId });
        if (jobId) params.set("automationId", jobId);
        return appShellRouteForParams(params);
      }
      return "";
    }

    function isAutomationReturn(value) {
      const rawValue = String(value || "").trim();
      if (!rawValue) return false;
      try {
        const url = new URL(rawValue, location.origin);
        return url.origin === location.origin && url.searchParams.get("view") === "automation";
      } catch (_) {
        return false;
      }
    }

    function fallbackReturnUrl() {
      const explicit = safeReturnUrl();
      const inferred = inferredReturnUrlFromSource();
      if (inferred && !isAutomationReturn(explicit)) return inferred;
      return explicit || inferred || safeReferrerUrl() || "/";
    }

    function navigateBack(event) {
      event?.preventDefault?.();
      if (embedded) {
        try {
          if (window.parent && window.parent !== window && window.parent.TaskDocumentPreviewUi?.closeActivePreviewFromUser) {
            window.parent.TaskDocumentPreviewUi.closeActivePreviewFromUser();
            return;
          }
        } catch (_) {}
      }
      location.assign(fallbackReturnUrl());
    }

    function pushViewerBackGuard() {
      try {
        history.pushState({ hermesViewerBackGuard: true }, "", location.href);
      } catch (_) {}
    }

    function wireViewerBackGuard() {
      try {
        history.replaceState(Object.assign({}, history.state || {}, { hermesViewerBase: true }), "", location.href);
        pushViewerBackGuard();
      } catch (_) {}
      window.addEventListener("popstate", () => {
        if (handlingViewerBack) return;
        handlingViewerBack = true;
        const target = fallbackReturnUrl();
        if (target && target !== `${location.pathname}${location.search}${location.hash}`) {
          location.assign(target);
          return;
        }
        pushViewerBackGuard();
        handlingViewerBack = false;
      });
    }

    function wireViewerBackSwipe(surface) {
      if (!surface || surface.dataset.viewerBackSwipeBound) return;
      surface.dataset.viewerBackSwipeBound = "1";
      let swipe = null;
      surface.addEventListener("touchstart", (event) => {
        if (event.touches.length !== 1 || event.target?.closest?.("button, a, input, select, textarea, [contenteditable='true']")) {
          swipe = null;
          return;
        }
        swipe = {
          startX: event.touches[0].clientX,
          startY: event.touches[0].clientY,
          lastX: event.touches[0].clientX,
          dragging: false,
        };
      }, { passive: true });
      surface.addEventListener("touchmove", (event) => {
        if (!swipe || event.touches.length !== 1) return;
        const point = event.touches[0];
        const dx = point.clientX - swipe.startX;
        const dy = point.clientY - swipe.startY;
        if (dx <= 0 || (!swipe.dragging && (Math.abs(dx) < 16 || Math.abs(dx) < Math.abs(dy) * 1.2))) return;
        swipe.dragging = true;
        swipe.lastX = point.clientX;
        event.preventDefault();
        event.stopPropagation();
      }, { passive: false });
      const finish = () => {
        const current = swipe;
        swipe = null;
        if (!current?.dragging) return;
        if ((current.lastX || current.startX) - current.startX > 64) navigateBack();
      };
      surface.addEventListener("touchend", finish, { passive: true });
      surface.addEventListener("touchcancel", () => {
        swipe = null;
      }, { passive: true });
    }

    function wireImageBackSwipe(stage) {
      if (!stage || stage.dataset.backSwipeBound) return;
      stage.dataset.backSwipeBound = "1";
      stage.addEventListener("touchstart", (event) => {
        if (event.touches.length !== 1) return;
        imageSwipe = {
          startX: event.touches[0].clientX,
          startY: event.touches[0].clientY,
          lastX: event.touches[0].clientX,
          dragging: false,
        };
      }, { passive: true });
      stage.addEventListener("touchmove", (event) => {
        if (!imageSwipe || event.touches.length !== 1) return;
        const x = event.touches[0].clientX;
        const y = event.touches[0].clientY;
        const dx = x - imageSwipe.startX;
        const dy = y - imageSwipe.startY;
        if (!imageSwipe.dragging) {
          if (dx < 16 || Math.abs(dx) < Math.abs(dy) * 1.25) return;
          imageSwipe.dragging = true;
        }
        imageSwipe.lastX = x;
        event.preventDefault();
      }, { passive: false });
      const finish = () => {
        const swipe = imageSwipe;
        imageSwipe = null;
        if (!swipe?.dragging) return;
        if ((swipe.lastX || swipe.startX) - swipe.startX > 70) navigateBack();
      };
      stage.addEventListener("touchend", finish, { passive: true });
      stage.addEventListener("touchcancel", () => {
        imageSwipe = null;
      }, { passive: true });
    }

    async function fetchFileBlob() {
      const downloadUrl = downloadUrlFor(src);
      if (!downloadUrl || downloadUrl === "#") throw new Error("No file URL is available.");
      const headers = key ? { "X-Hermes-Web-Key": key } : {};
      const res = await fetch(downloadUrl, { headers });
      if (!res.ok) throw new Error(`${res.status} ${res.statusText}`);
      return res.blob();
    }

    function prepareShareBlob() {
      if (!shareBlobPromise) {
        shareBlobPromise = fetchFileBlob()
          .then((blob) => {
            cachedShareBlob = blob;
            return blob;
          })
          .catch((err) => {
            shareBlobPromise = null;
            throw err;
          });
      }
      return shareBlobPromise;
    }

    function isUserCancelledShare(err) {
      return String(err?.name || "").toLowerCase() === "aborterror";
    }

    function canShareFiles(files) {
      return Boolean(navigator.share && (!navigator.canShare || navigator.canShare({ files })));

    function setStatus(message) {
      previewStatus.textContent = message || "";
      previewStatus.classList.toggle("hidden", !message);

    function setTransientStatus(message) {
      window.clearTimeout(toastTimer);
      toast.textContent = message || "";
      toast.classList.toggle("hidden", !message);
      if (message) {
        toastTimer = window.setTimeout(() => {
          toast.textContent = "";

    async function loadTextPreview(label, options = {}) {
      const previewUrl = previewUrlFor(src);

      setStatus("Loading preview...");
      const headers = key ? { "X-Hermes-Web-Key": key } : {};
      const res = await fetch(previewUrl, { headers });
      const body = await res.json().catch(() => ({}));

    async function downloadFile(event) {
      event.preventDefault();
      const downloadUrl = downloadUrlFor(src);
      if (!downloadUrl || downloadUrl === "#") return;
      setStatus("Preparing download...");

    function markdownBaseName(extension) {
      const base = String(name || "document")
        .replace(/\.[^.]+$/, "")
        .replace(/[\\/:*?"<>|]+/g, "-")
        .trim() || "document";
      return `${base}.${extension}`;

    async function ensureMarkdownPreviewText() {
      if (cachedPreviewText) return cachedPreviewText;
      const previewUrl = previewUrlFor(src);
      if (!previewUrl) return "";
      const headers = key ? { "X-Hermes-Web-Key": key } : {};
      const res = await fetch(previewUrl, { headers });
      const body = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(body.error || `${res.status} ${res.statusText}`);
      cachedPreviewText = String(body.text || "");
      return cachedPreviewText;
    }

    function authHeaders(extra = {}) {
      return Object.assign({}, extra, key ? { "X-Hermes-Web-Key": key } : {});
    }

    async function apiJson(url, options = {}) {
      const headers = authHeaders(Object.assign({ "Content-Type": "application/json" }, options.headers || {}));
      const res = await fetch(url, Object.assign({}, options, { headers }));
      const body = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(body.error || `${res.status} ${res.statusText}`);
      return body;
    }

    function workspaceIdForForward() {
      const direct = String(params.get("workspaceId") || "").trim();
      if (direct) return direct;
      const candidates = [returnUrl, src, document.referrer];
      for (const candidate of candidates) {
        try {
          const url = new URL(candidate || "", location.origin);
          if (url.origin !== location.origin) continue;
          const workspaceId = String(url.searchParams.get("workspaceId") || "").trim();
          if (workspaceId) return workspaceId;
        } catch (_) {}
      }
      return localStorage.getItem("hermesWebWorkspace") || "owner";
    }

    function bytesToBase64(bytes) {
      let binary = "";
      const chunkSize = 0x8000;
      for (let index = 0; index < bytes.length; index += chunkSize) {
        binary += String.fromCharCode(...bytes.subarray(index, index + chunkSize));
      }
      return btoa(binary);
    }

    async function forwardMarkdownToGroup() {
      const text = await ensureMarkdownPreviewText();
      if (!text.trim()) throw new Error("Markdown preview is empty.");
      const workspaceId = workspaceIdForForward();
      setTransientStatus("\u6b63\u5728\u8f6c\u53d1\u5230\u7fa4...");
      const singleWindow = await apiJson("/api/single-window", {
        method: "POST",
        body: JSON.stringify({ workspaceId, groupChat: true }),
      });
      const threadId = singleWindow.thread?.id || "";
      if (!threadId) throw new Error("Group chat thread is unavailable.");
      const filename = String(name || "").toLowerCase().endsWith(".md") ? name : markdownBaseName("md");
      const dataBase64 = bytesToBase64(new TextEncoder().encode(text));
      const upload = await apiJson(`/api/threads/${encodeURIComponent(threadId)}/uploads`, {
        method: "POST",
        body: JSON.stringify({
          filename,
          type: "text/markdown; charset=utf-8",
          dataBase64,
        }),
      });
      if (!upload.artifact) throw new Error("Markdown upload failed.");
      await apiJson(`/api/threads/${encodeURIComponent(threadId)}/messages`, {
        method: "POST",
        body: JSON.stringify({
          text: `\u8f6c\u53d1 Markdown\uff1a${filename}`,
          artifacts: [upload.artifact],
          workspaceId,
          singleWindowMode: "chat",
          taskGroupId: "group-chat",
          messageKind: "plain",
        }),
      });
      setTransientStatus("\u5df2\u8f6c\u53d1\u5230\u7fa4");
    }

    function downloadGeneratedBlob(blob, filename) {
      const objectUrl = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = objectUrl;
      link.download = filename;
      document.body.append(link);
      link.click();
      link.remove();
      window.setTimeout(() => URL.revokeObjectURL(objectUrl), 30000);
    }

    async function shareGeneratedMarkdownFile(format) {
      await ensureMarkdownPreviewText();
      const isWord = format === "word";
      const filename = markdownBaseName(isWord ? "doc" : "html");
      const type = isWord ? "application/msword" : "text/html;charset=utf-8";
      const blob = new Blob([markdownExportHtml()], { type });
      const file = new File([blob], filename, { type });
      if (canShareFiles([file])) {
        await navigator.share({ files: [file], title: filename });
        setTransientStatus("");
        return;
      }
      downloadGeneratedBlob(blob, filename);
      setTransientStatus("Generated file saved for sharing.");
    }

    async function printMarkdownAsPdf() {
      await ensureMarkdownPreviewText();
      const html = markdownExportHtml({ autoPrint: true });
      const blob = new Blob([html], { type: "text/html;charset=utf-8" });
      const objectUrl = URL.createObjectURL(blob);
      const iframe = document.createElement("iframe");
      iframe.hidden = true;
      iframe.src = objectUrl;
      iframe.onload = () => {
        try {
          iframe.contentWindow?.focus?.();
          iframe.contentWindow?.print?.();
        } catch (_) {
          downloadGeneratedBlob(blob, markdownBaseName("html"));
        }
        window.setTimeout(() => {
          iframe.remove();
          URL.revokeObjectURL(objectUrl);
        }, 120000);
      };
      document.body.append(iframe);
      setTransientStatus("Print preview opened in this window.");
    }

    async function copyMarkdownText() {
      const text = await ensureMarkdownPreviewText();
      if (navigator.clipboard?.writeText) {
        await navigator.clipboard.writeText(text);
        setTransientStatus("Copied.");
        return;
      }
      if (navigator.share) {
        await navigator.share({ title: name, text });
        setTransientStatus("");
        return;
      }
      throw new Error("Clipboard is not available.");
    }

    function hideMarkdownShareSheet() {
      document.getElementById("markdownShareSheet")?.classList.add("hidden");
      setMarkdownShareStatus("");
    }

    function showMarkdownShareSheet() {
      setMarkdownShareStatus("");
      document.getElementById("markdownShareSheet")?.classList.remove("hidden");
    }

    async function handleMarkdownShareAction(action, button = null) {
      if (!action || action === "close") {
        hideMarkdownShareSheet();
        return;
      }
      setMarkdownShareBusy(button, true);
      setMarkdownShareStatus("");
      try {
        if (action === "html") await shareGeneratedMarkdownFile("html");
        else if (action === "word") await shareGeneratedMarkdownFile("word");
        else if (action === "print") await printMarkdownAsPdf();
        else if (action === "copy") await copyMarkdownText();
        else if (action === "group") await forwardMarkdownToGroup();
        else if (action === "raw") await shareOriginalFile();
        hideMarkdownShareSheet();
      } catch (err) {
        if (!isUserCancelledShare(err)) {
          const message = err.message || "Share failed.";
          setMarkdownShareStatus(message, "error");
          setTransientStatus(message);
        }
      } finally {
        setMarkdownShareBusy(button, false);
      }
    }

    function wireMarkdownShareSheet() {
      const sheet = document.getElementById("markdownShareSheet");
      if (!sheet) return;
      sheet.addEventListener("click", (event) => {
        const button = event.target?.closest?.("[data-markdown-share]");
        if (!button) {
          if (event.target === sheet) hideMarkdownShareSheet();
          return;
        }
        handleMarkdownShareAction(button.dataset.markdownShare || "", button);
      });
    }

    async function shareOriginalFile() {
      if (!src) return;
      if (await openNativeDocumentOpenInFromViewer()) return;
      const downloadUrl = downloadUrlFor(src);
      const shareUrl = absoluteUrlFor(downloadUrl);
      try {
        if (cachedShareBlob) {
          const file = new File([cachedShareBlob], name, { type: cachedShareBlob.type || mime || "application/octet-stream" });
          if (canShareFiles([file])) {
            await navigator.share({ files: [file], title: name });
            setTransientStatus("");
            return;
          }
        } else {
          prepareShareBlob().catch(() => {});
        }
        if (navigator.share && shareUrl) {
          await navigator.share({ title: name, url: shareUrl });
          setTransientStatus("");
          return;
        }
        if (!cachedShareBlob) {
          setTransientStatus("\u6587\u4ef6\u8fd8\u5728\u51c6\u5907\uff0c\u5df2\u5148\u6253\u5f00\u539f\u6587\u4ef6\u3002");
          location.href = downloadUrl;
          return;
        }
        const cachedFile = new File([cachedShareBlob], name, { type: cachedShareBlob.type || mime || "application/octet-stream" });
        if (canShareFiles([cachedFile])) {
          await navigator.share({ files: [cachedFile], title: name });
          setTransientStatus("");
          return;
        }
        downloadGeneratedBlob(cachedShareBlob, name);
        setTransientStatus("\u6b64\u6d4f\u89c8\u5668\u4e0d\u652f\u6301\u7cfb\u7edf\u5206\u4eab\uff0c\u5df2\u4fdd\u5b58\u6587\u4ef6\u3002");
        return;
      } catch (err) {
        if (isUserCancelledShare(err)) return;
        setTransientStatus("\u7cfb\u7edf\u5206\u4eab\u4e0d\u53ef\u7528\uff0c\u5df2\u6253\u5f00\u539f\u6587\u4ef6\u3002");
        location.href = downloadUrl;
        return;
      }
      setTransientStatus("准备文件...");
      try {
        const blob = await fetchFileBlob();
        const file = new File([blob], name, { type: blob.type || mime || "application/octet-stream" });
        if (navigator.canShare?.({ files: [file] }) && navigator.share) {
          await navigator.share({ files: [file], title: name });
          setTransientStatus("");
          return;
        }
        downloadGeneratedBlob(blob, name);
        setTransientStatus("\u6b64\u6d4f\u89c8\u5668\u4e0d\u652f\u6301\u7cfb\u7edf\u5206\u4eab\uff0c\u5df2\u4fdd\u5b58\u6587\u4ef6\u3002");
      } catch (err) {
        setTransientStatus(err.message || "\u65e0\u6cd5\u5206\u4eab\u6b64\u6587\u4ef6\u3002");
      }
    }

    async function saveImageToAlbum() {
      if (!src) return;
      const downloadUrl = downloadUrlFor(src);
      try {
        const blob = cachedShareBlob || await prepareShareBlob();
        const file = new File([blob], name, { type: blob.type || mime || "image/*" });
        if (canShareFiles([file])) {
          await navigator.share({ files: [file], title: name });
          setTransientStatus("已打开系统保存面板");
          return;
        }
        downloadGeneratedBlob(blob, name);
        setTransientStatus("已请求保存图片；如未进入相册，请长按图片保存。");
      } catch (err) {
        if (isUserCancelledShare(err)) return;
        setTransientStatus("系统保存不可用，已打开原始图片。");
        if (downloadUrl && downloadUrl !== "#") location.href = downloadUrl;
      }
    }

      if (isMarkdownDocument()) {
        showMarkdownShareSheet();
        return;

    if (internalReturnUrl) document.getElementById("back").href = internalReturnUrl;
    document.getElementById("back").addEventListener("click", navigateBack);
    document.getElementById("done").addEventListener("click", navigateBack);
    if (!embedded) wireViewerBackGuard();
    wireViewerBackSwipe(document.querySelector(".shell"));
    wireMarkdownShareSheet();
    document.getElementById("open").href = originalUrlFor(src);
    document.getElementById("download").href = downloadUrlFor(src);
    document.getElementById("download").setAttribute("download", name);
    document.getElementById("download").addEventListener("click", downloadFile);
    document.getElementById("share").addEventListener("click", shareFile);
    document.getElementById("previewModeToggle").addEventListener("click", switchPreviewMode);
    document.getElementById("saveImage").addEventListener("click", saveImageToAlbum);
    if (src && !isMarkdownDocument()) window.setTimeout(() => prepareShareBlob().catch(() => {}), 500);
    updatePreviewModeToggle();

    function renderInAppPreview() {
      if (src && kind === "IMG") {
        enableImageDocumentMode();
      }

      if (src && kind === "HTML") {
        location.replace(originalUrlFor(src));
      }

      if (src && kind === "DOC" && String(name).toLowerCase().endsWith(".docx")) {
        enableTextDocumentMode({ office: true });
        loadTextPreview("Word 预览", { markdown: true }).catch((err) => {
          setStatus(err.message || "Word 预览失败。");
        });
      } else if (src && kind === "DOC") {
        document.body.classList.add("office-document-mode");
        setStatus("旧版 .doc 暂不能在 Home AI 内部预览，请使用 Open Original。");
      } else if (src && kind === "MD") {
        enableTextDocumentMode();
        loadTextPreview("Markdown preview", { markdown: true }).catch((err) => {
          setStatus(err.message || "Markdown preview failed.");
        });
      } else if (src && kind === "TXT") {
        enableTextDocumentMode();
        loadTextPreview("Text preview").catch((err) => {
          setStatus(err.message || "Text preview failed.");
        });
      } else if (src && (kind === "SHEET" || kind === "SLIDE")) {
        document.body.classList.add("office-document-mode");
        setStatus("已进入应用内预览壳。若系统未内嵌显示内容，请使用右上角菜单或 Open Original 打开原始格式。");
      }
    }

    if (
      !src
      || !waitForNativeDocumentPreviewFromViewer({
        onFailure: (error) => {
          if (nativeDocumentBridgeExpected()) {
            showNativeDocumentPreviewFailure(error);
            return;
          }
          renderInAppPreview();
        },
      })
    ) {
      renderInAppPreview();
    }
  </script>
</body>
</html>
