<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <title>PDF Preview</title>
  <script>
    (function () {
      try {
        var stored = localStorage.getItem("hermesWebTheme") || "system";
        var effective = stored === "dark" || (stored === "system" && window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches) ? "dark" : "light";
        document.documentElement.dataset.theme = stored === "dark" || stored === "light" ? stored : "system";
        document.documentElement.dataset.effectiveTheme = effective;
      } catch (_) {
        document.documentElement.dataset.theme = "system";
      }
    }());
  </script>
  <style>
    :root {
      --pdf-page-bg: #f5efe4;
      --pdf-canvas-bg: #f7f1e7;
      --pdf-ink: #26312f;
      --pdf-link: #1f6f62;
      --pdf-error-bg: #fffaf1;
      --pdf-error-ink: #8b3f38;
    }

    html[data-effective-theme="dark"] {
      color-scheme: dark;
      --pdf-page-bg: #101214;
      --pdf-canvas-bg: #15191c;
      --pdf-ink: #f5f7f6;
      --pdf-link: #edf7f7;
      --pdf-error-bg: #2b2423;
      --pdf-error-ink: #f0a097;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      background: var(--pdf-page-bg);
      overflow: hidden;
      overscroll-behavior: contain;
      touch-action: pan-y;
      -webkit-text-size-adjust: 100%;
    }

    .pdf-scroll {
      width: 100vw;
      height: 100dvh;
      overflow-x: auto;
      overflow-y: auto;
      overscroll-behavior-y: contain;
      -webkit-overflow-scrolling: touch;
      touch-action: pan-x pan-y;
      background: var(--pdf-page-bg);
    }

    .pages {
      width: max-content;
      min-width: 100vw;
      min-height: 100dvh;
      background: var(--pdf-page-bg);
      touch-action: pan-x pan-y;
    }

    canvas {
      display: block;
      height: auto;
      margin: 0;
      max-width: none;
      background: var(--pdf-canvas-bg);
      touch-action: pan-x pan-y;
      pointer-events: auto;
    }

    .status,
    .back-button,
    .share-button {
      position: fixed;
      z-index: 2;
      font: 700 14px/1.2 "Aptos", "Segoe UI", "Microsoft YaHei", sans-serif;
      color: #f8fafc;
      background: rgba(15, 23, 42, 0.88);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.22);
      backdrop-filter: blur(14px);
    }

    .status {
      left: 50%;
      top: calc(14px + env(safe-area-inset-top));
      transform: translateX(-50%);
      max-width: min(76vw, 420px);
      padding: 10px 14px;
      border-radius: 999px;
      text-align: center;
    }

    .back-button {
      display: none;
      left: max(8px, env(safe-area-inset-left));
      top: calc(8px + env(safe-area-inset-top));
      place-items: center;
      width: 42px;
      height: 42px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 13px;
      text-decoration: none;
      font-size: 25px;
      line-height: 1;
    }

    .share-button {
      right: max(8px, env(safe-area-inset-right));
      top: calc(8px + env(safe-area-inset-top));
      min-width: 42px;
      min-height: 34px;
      padding: 0 12px 3px;
      color: rgba(248, 250, 252, 0.92);
      background: rgba(15, 23, 42, 0.50);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 999px;
      font-size: 21px;
      line-height: 1;
    }

    .mode-toggle-button {
      right: calc(max(8px, env(safe-area-inset-right)) + 52px);
      min-width: 94px;
      padding: 0 12px;
      font-size: 13px;
      font-weight: 800;
    }

    .viewer-toast {
      position: fixed;
      z-index: 3;
      left: 50%;
      bottom: calc(18px + env(safe-area-inset-bottom));
      transform: translateX(-50%);
      max-width: min(360px, calc(100vw - 28px));
      padding: 8px 12px;
      color: #f8fafc;
      background: rgba(15, 23, 42, 0.72);
      border-radius: 999px;
      backdrop-filter: blur(14px);
      font: 700 13px/1.25 "Aptos", "Segoe UI", "Microsoft YaHei", sans-serif;
      text-align: center;
      pointer-events: none;
    }

    .hidden {
      display: none !important;
    }

    body.embedded-viewer .back-button,
    body.embedded-viewer .mode-toggle-button {
      display: none !important;
    }

    .fallback {
      min-height: 100dvh;
      display: grid;
      place-items: center;
      padding: 24px;
      color: var(--pdf-ink);
      font: 16px/1.5 "Aptos", "Segoe UI", "Microsoft YaHei", sans-serif;
      text-align: center;
    }

    .fallback a {
      color: var(--pdf-link);
    }

    .fallback-actions {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 8px;
      margin-top: 12px;
    }

    .fallback-actions button,
    .fallback-actions a {
      min-height: 36px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0 12px;
      color: var(--pdf-ink);
      text-decoration: none;
      background: rgba(255, 255, 255, 0.68);
      border: 1px solid rgba(38, 49, 47, 0.16);
      border-radius: 10px;
      font: 700 14px/1.2 "Aptos", "Segoe UI", "Microsoft YaHei", sans-serif;
    }

    .pdf-page-error {
      box-sizing: border-box;
      width: 100vw;
      min-height: 180px;
      display: grid;
      place-items: center;
      padding: 24px;
      color: var(--pdf-error-ink);
      background: var(--pdf-error-bg);
      border-bottom: 1px solid rgba(38, 49, 47, 0.10);
      font: 700 14px/1.4 "Aptos", "Segoe UI", "Microsoft YaHei", sans-serif;
      text-align: center;
    }
  </style>
</head>
<body>
  <a id="backButton" class="back-button" href="javascript:history.back()" aria-label="Back">&#8249;</a>
  <button id="previewModeToggle" class="share-button mode-toggle-button" type="button" aria-label="原始格式显示" title="原始格式显示">原始格式</button>
  <button id="shareButton" class="share-button" type="button" aria-label="系统分享" title="系统分享">...</button>
  <main id="pdfScroll" class="pdf-scroll">
    <div id="pages" class="pages" aria-label="PDF pages"></div>
    <div id="fallback" class="fallback hidden"></div>
  </main>
  <div id="status" class="status">Loading PDF...</div>
  <div id="toast" class="viewer-toast hidden" role="status" aria-live="polite"></div>

  <script src="/fixed-viewport.js?v=20260505-1135"></script>
  <script type="module">
    import * as pdfjsLib from "/vendor/pdfjs/pdf.min.js";

    pdfjsLib.GlobalWorkerOptions.workerSrc = "/vendor/pdfjs/pdf.worker.min.js";

    const pages = document.getElementById("pages");
    const status = document.getElementById("status");
    const toast = document.getElementById("toast");
    const fallback = document.getElementById("fallback");
    const params = new URLSearchParams(location.search);
    const raw = params.get("src") || "";
    const name = params.get("name") || "document.pdf";
    const key = localStorage.getItem("hermesWebKey") || "";
    const returnUrl = params.get("return") || "";
    const embedded = params.get("embed") === "1";
    const forceWebPreview = params.get("webPreview") === "1";
    document.body.classList.toggle("embedded-viewer", embedded);
    let pdfDocument = null;
    let renderSerial = 0;
    let resizeTimer = 0;
    let toastTimer = 0;
    let cachedPdfBlob = null;
    let pdfBlobPromise = null;
    let handlingViewerBack = false;
    const isAndroid = /Android/i.test(navigator.userAgent || "");
    const EDGE_BACK_SWIPE_PX = 38;
    const pdfCanvasBackground = getComputedStyle(document.documentElement).getPropertyValue("--pdf-canvas-bg").trim() || "#f7f1e7";

    function setStatus(message) {
      status.textContent = message;
      status.classList.toggle("hidden", !message);
    }

    function setTransientStatus(message) {
      window.clearTimeout(toastTimer);
      toast.textContent = message || "";
      toast.classList.toggle("hidden", !message);
      if (message) {
        toastTimer = window.setTimeout(() => {
          toast.textContent = "";
          toast.classList.add("hidden");
        }, 2000);
      }
    }

    function showFallback(message, href = "") {
      document.documentElement.dataset.pdfStatus = "error";
      document.documentElement.dataset.pdfRenderedPages = "0";
      pages.replaceChildren();
      status.classList.add("hidden");
      fallback.classList.remove("hidden");
      fallback.textContent = message;
      if (href) {
        const br = document.createElement("br");
        const link = document.createElement("a");
        link.href = href;
        link.target = "_self";
        link.rel = "noopener";
        link.textContent = "Open PDF directly";
        fallback.append(br, link);
      }
    }

    function sameOriginUrl(value) {
      try {
        const url = new URL(value, location.origin);
        if (url.origin !== location.origin) return null;
        return url;
      } catch (_) {
        return null;
      }
    }

    function downloadUrlFor(value) {
      const url = sameOriginUrl(value);
      if (!url) return value || "#";
      url.searchParams.set("download", "1");
      return `${url.pathname}${url.search}${url.hash}`;
    }

    function originalUrlFor(value) {
      const url = sameOriginUrl(value);
      if (!url) return value || "#";
      if (url.pathname === "/api/files/preview") {
        url.pathname = "/api/files";
      }
      return `${url.pathname}${url.search}${url.hash}`;
    }

    function nativeDocumentPreviewRequestId() {
      try {
        if (crypto?.randomUUID) return `native_doc_${crypto.randomUUID()}`;
      } catch (_) {}
      return `native_doc_${Date.now().toString(36)}_${Math.random().toString(36).slice(2, 10)}`;
    }

    function parsedNativeDocumentResult(value) {
      if (!value) return null;
      if (typeof value === "object") return value;
      if (typeof value !== "string") return null;
      try {
        const parsed = JSON.parse(value);
        return parsed && typeof parsed === "object" ? parsed : null;
      } catch (_) {
        return null;
      }
    }

    function nativeDocumentResultForEvent(event) {
      return parsedNativeDocumentResult(event?.detail) || parsedNativeDocumentResult(event?.data) || null;
    }

    function rawAndroidNativeDocumentBridge(target) {
      const raw = target?.HomeAIAndroidNativeDocument || null;
      return raw && typeof raw.open === "function" ? raw : null;
    }

    function rawIosNativeDocumentBridge(target) {
      const handlers = target?.webkit?.messageHandlers || {};
      const handler = handlers.homeAINativeDocument || handlers.HomeAINativeDocument || null;
      return handler && typeof handler.postMessage === "function" ? handler : null;
    }

    function ensureNativeDocumentBridgeForTarget(target) {
      if (!target) return null;
      const capability = target.HomeAINativeDocumentCapability || {};
      const bridge = target.HomeAINativeDocument || {};
      if (capability.documentPreview === true && typeof bridge.open === "function") return bridge;

      const androidBridge = rawAndroidNativeDocumentBridge(target);
      const iosBridge = rawIosNativeDocumentBridge(target);
      if (!androidBridge && !iosBridge) return null;

      const platform = androidBridge ? "android" : "ios";
      target.HomeAINativeDocumentCapability = Object.assign({}, capability, {
        documentPreview: true,
        platform: capability.platform || platform,
        version: capability.version || 1,
      });
      target.HomeAINativeDocument = Object.assign({}, bridge, {
        open(request) {
          const safeRequest = Object.assign({}, request || {});
          if (!safeRequest.requestId) safeRequest.requestId = nativeDocumentPreviewRequestId();
          return new Promise((resolve) => {
            let settled = false;
            let timeoutId = 0;
            const finish = (body) => {
              if (settled) return;
              settled = true;
              if (timeoutId) target.clearTimeout?.(timeoutId);
              target.removeEventListener?.("homeai:native-document-result", onResult);
              const result = parsedNativeDocumentResult(body) || {};
              resolve(Object.assign({ ok: result.ok !== false, requestId: safeRequest.requestId }, result));
            };
            const onResult = (event) => {
              const body = nativeDocumentResultForEvent(event);
              if (!body) return;
              if (body.requestId && body.requestId !== safeRequest.requestId) return;
              finish(body);
            };
            target.addEventListener?.("homeai:native-document-result", onResult);
            timeoutId = target.setTimeout?.(() => {
              finish({ ok: false, requestId: safeRequest.requestId, error: "native_document_result_timeout" });
            }, 15000);
            try {
              const payload = JSON.stringify(safeRequest);
              const immediate = androidBridge
                ? androidBridge.open(payload)
                : iosBridge.postMessage(safeRequest);
              const parsed = parsedNativeDocumentResult(immediate);
              if (parsed && (parsed.ok === false || parsed.ok === true || parsed.error)) finish(parsed);
            } catch (err) {
              finish({ ok: false, requestId: safeRequest.requestId, error: err?.message || "native_document_open_failed" });
            }
          });
        },
      });
      return target.HomeAINativeDocument;
    }

    function nativeDocumentBridgeTarget() {
      const candidates = [window];
      try {
        if (window.parent && window.parent !== window) candidates.push(window.parent);
      } catch (_) {}
      for (const target of candidates) {
        try {
          if (ensureNativeDocumentBridgeForTarget(target)) {
            return target;
          }
        } catch (_) {}
      }
      return null;
    }

    function nativeDocumentBridgeAvailable() {
      return Boolean(nativeDocumentBridgeTarget());
    }

    function nativeDocumentOpenInBridgeTarget() {
      const candidates = [window];
      try {
        if (window.parent && window.parent !== window) candidates.push(window.parent);
      } catch (_) {}
      for (const target of candidates) {
        try {
          const bridge = ensureNativeDocumentBridgeForTarget(target);
          const capability = target?.HomeAINativeDocumentCapability || {};
          if (capability.documentOpenIn === true && bridge && typeof bridge.open === "function") return target;
        } catch (_) {}
      }
      return null;
    }

    function nativeDocumentBridgeExpected() {
      const queryValue = params.get("nativeShell") || "";
      if (queryValue === "ios" || queryValue === "android") return true;
      const root = document.documentElement;
      const datasetValue = root?.dataset?.nativeShell || "";
      if (datasetValue === "ios" || datasetValue === "android") return true;
      try {
        const storedValue = localStorage.getItem("homeAI.nativeShell") || "";
        if (storedValue === "ios" || storedValue === "android") return true;
      } catch (_) {}
      return false;
    }

    function nativePdfOpenRequest() {
      if (!raw) return null;
      const openUrl = originalUrlFor(raw);
      const url = sameOriginUrl(openUrl);
      if (!url || !url.pathname.startsWith("/api/")) return null;
      return {
        type: "homeai.nativeDocument.open",
        version: 1,
        requestId: nativeDocumentPreviewRequestId(),
        url: `${url.pathname}${url.search}${url.hash}`,
        filename: name || "document.pdf",
        mimeType: "application/pdf",
        kind: "pdf",
        sourceSurface: "pdf-viewer",
        requiresAuth: true,
      };
    }

    function nativePdfOpenInRequest() {
      const request = nativePdfOpenRequest();
      return request ? Object.assign({}, request, { mode: "openIn" }) : null;
    }

    function shouldUseNativePdfPreview() {
      return Boolean(!forceWebPreview && nativeDocumentBridgeAvailable() && nativePdfOpenRequest());
    }

    function canWaitForNativePdfPreview() {
      return Boolean(!forceWebPreview && nativePdfOpenRequest() && nativeDocumentBridgeExpected());
    }

    function showNativePdfPreviewFailure(error = "") {
      document.documentElement.dataset.nativeDocumentStatus = "failed";
      const message = error === "native_document_result_timeout"
        ? "系统预览没有返回结果，请重启 Home AI 原生壳后再试。"
        : "系统预览桥接不可用，请更新或重启 Home AI 原生壳后再试。你仍然可以用系统打开方式、分享或下载继续查看。";
      showFallback(`${message}${error ? ` (${error})` : ""}`, "");
      const actions = document.createElement("div");
      actions.className = "fallback-actions";
      const openIn = document.createElement("button");
      openIn.type = "button";
      openIn.textContent = "用其他 App 打开";
      openIn.addEventListener("click", async () => {
        if (await openNativePdfOpenIn()) return;
        setTransientStatus("系统打开方式不可用，请改用下载或分享。");
      });
      const share = document.createElement("button");
      share.type = "button";
      share.textContent = "下载或分享";
      share.addEventListener("click", sharePdf);
      const web = document.createElement("a");
      web.href = `${location.pathname}?${new URLSearchParams(Object.assign(Object.fromEntries(params), { webPreview: "1" })).toString()}`;
      web.target = "_self";
      web.rel = "noopener";
      web.textContent = "Web 调试预览";
      actions.append(openIn, share, web);
      fallback.append(actions);
    }

    function openNativePdfPreview(options = {}) {
      if (!shouldUseNativePdfPreview()) return false;
      const request = nativePdfOpenRequest();
      const onFailure = typeof options.onFailure === "function" ? options.onFailure : null;
      const bridgeTarget = nativeDocumentBridgeTarget();
      if (!bridgeTarget) return false;
      const bridge = ensureNativeDocumentBridgeForTarget(bridgeTarget);
      if (!bridge) return false;
      try {
        setStatus("正在打开系统预览...");
        const result = bridge.open(request);
        if (result && typeof result.then === "function") {
          result
            .then((body) => {
              if (body && body.ok === false) onFailure?.(body.error || "native_document_open_failed");
            })
            .catch((err) => onFailure?.(err?.message || "native_document_open_failed"));
          return true;
        }
        if (result && result.ok === false) {
          onFailure?.(result.error || "native_document_open_failed");
          return Boolean(onFailure);
        }
        return true;
      } catch (err) {
        onFailure?.(err?.message || "native_document_open_failed");
        return Boolean(onFailure);
      }
    }

    async function openNativePdfOpenIn() {
      const request = nativePdfOpenInRequest();
      const bridgeTarget = request ? nativeDocumentOpenInBridgeTarget() : null;
      if (!request || !bridgeTarget) return false;
      const bridge = ensureNativeDocumentBridgeForTarget(bridgeTarget);
      if (!bridge) return false;
      try {
        setTransientStatus("正在打开系统打开方式...");
        const result = await bridge.open(request);
        if (result && result.ok === true) {
          setTransientStatus("");
          return true;
        }
        return false;
      } catch (_) {
        return false;
      }
    }

    function waitForNativePdfPreview(options = {}) {
      if (!canWaitForNativePdfPreview()) return false;
      if (openNativePdfPreview(options)) return true;
      const onFailure = typeof options.onFailure === "function" ? options.onFailure : null;
      const timeoutMs = Number.isFinite(options.timeoutMs) ? Math.max(0, options.timeoutMs) : 1800;
      const startedAt = Date.now();
      setStatus("正在准备系统预览...");
      const retry = () => {
        if (openNativePdfPreview(options)) return;
        if (Date.now() - startedAt >= timeoutMs) {
          onFailure?.("native_document_bridge_unavailable");
          return;
        }
        window.setTimeout(retry, 120);
      };
      window.setTimeout(retry, 80);
      return true;
    }

    function downloadBlob(blob, filename) {
      const objectUrl = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = objectUrl;
      link.download = filename || "document.pdf";
      document.body.append(link);
      link.click();
      link.remove();
      window.setTimeout(() => URL.revokeObjectURL(objectUrl), 30000);
    }

    function absoluteUrlFor(value) {
      try {
        return new URL(value || "#", location.href).href;
      } catch (_) {
        return value || "";
      }
    }

    function safeReturnUrl() {
      const value = String(returnUrl || "").trim();
      if (!value) return "";
      try {
        const url = new URL(value, location.origin);
        if (url.origin !== location.origin) return "";
        return `${url.pathname}${url.search}${url.hash}`;
      } catch (_) {
        return "";
      }
    }

    function safeReferrerUrl() {
      const value = String(document.referrer || "").trim();
      if (!value) return "";
      try {
        const url = new URL(value, location.origin);
        if (url.origin !== location.origin) return "";
        return `${url.pathname}${url.search}${url.hash}`;
      } catch (_) {
        return "";
      }
    }

    function appShellRouteForParams(params) {
      const nextParams = new URLSearchParams(params || "");
      if (!nextParams.has("source")) nextParams.set("source", "pwa");
      let shellPath = "/";
      try {
        const referrer = new URL(document.referrer || "/", location.origin);
        if (referrer.origin === location.origin && referrer.pathname && !referrer.pathname.includes(".")) {
          shellPath = referrer.pathname.endsWith("/") ? referrer.pathname : `${referrer.pathname}/`;
        }
      } catch (_) {}
      return `${shellPath}${nextParams.toString() ? `?${nextParams.toString()}` : ""}`;
    }

    function inferredReturnUrlFromSource() {
      const url = sameOriginUrl(raw);
      if (!url) return "";
      if (url.pathname === "/api/automations/output" || url.pathname === "/api/automations/deliverable") {
        const workspaceId = String(url.searchParams.get("workspaceId") || "owner").trim() || "owner";
        const jobId = String(url.searchParams.get("jobId") || "").trim();
        const params = new URLSearchParams({ view: "automation", workspaceId });
        if (jobId) params.set("automationId", jobId);
        return appShellRouteForParams(params);
      }
      return "";
    }

    function isAutomationReturn(value) {
      const rawValue = String(value || "").trim();
      if (!rawValue) return false;
      try {
        const url = new URL(rawValue, location.origin);
        return url.origin === location.origin && url.searchParams.get("view") === "automation";
      } catch (_) {
        return false;
      }
    }

    function fallbackReturnUrl() {
      const explicit = safeReturnUrl();
      const inferred = inferredReturnUrlFromSource();
      if (inferred && !isAutomationReturn(explicit)) return inferred;
      return explicit || inferred || safeReferrerUrl() || "/";
    }

    function navigateBack(event) {
      event?.preventDefault?.();
      if (embedded) {
        try {
          if (window.parent && window.parent !== window && window.parent.TaskDocumentPreviewUi?.closeActivePreviewFromUser) {
            window.parent.TaskDocumentPreviewUi.closeActivePreviewFromUser();
            return;
          }
        } catch (_) {}
      }
      location.assign(fallbackReturnUrl());
    }

    function pushViewerBackGuard() {
      try {
        history.pushState({ hermesViewerBackGuard: true }, "", location.href);
      } catch (_) {}
    }

    function wireViewerBackGuard() {
      try {
        history.replaceState(Object.assign({}, history.state || {}, { hermesViewerBase: true }), "", location.href);
        pushViewerBackGuard();
      } catch (_) {}
      window.addEventListener("popstate", () => {
        if (handlingViewerBack) return;
        handlingViewerBack = true;
        const target = fallbackReturnUrl();
        if (target && target !== `${location.pathname}${location.search}${location.hash}`) {
          location.assign(target);
          return;
        }
        pushViewerBackGuard();
        handlingViewerBack = false;
      });
    }

    function wireViewerBackSwipe(surface) {
      if (!surface || surface.dataset.viewerBackSwipeBound) return;
      surface.dataset.viewerBackSwipeBound = "1";
      let swipe = null;
      surface.addEventListener("touchstart", (event) => {
        if (event.touches.length !== 1) {
          swipe = null;
          return;
        }
        const point = event.touches[0];
        if (
          point.clientX > EDGE_BACK_SWIPE_PX
          || event.target?.closest?.("button, a, input, select, textarea, [contenteditable='true']")
        ) {
          swipe = null;
          return;
        }
        swipe = {
          startX: event.touches[0].clientX,
          startY: event.touches[0].clientY,
          lastX: event.touches[0].clientX,
          dragging: false,
        };
      }, { passive: true });
      surface.addEventListener("touchmove", (event) => {
        if (!swipe || event.touches.length !== 1) return;
        const point = event.touches[0];
        const dx = point.clientX - swipe.startX;
        const dy = point.clientY - swipe.startY;
        if (dx <= 0 || (!swipe.dragging && (Math.abs(dx) < 16 || Math.abs(dx) < Math.abs(dy) * 1.2))) return;
        swipe.dragging = true;
        swipe.lastX = point.clientX;
        event.preventDefault();
        event.stopPropagation();
      }, { passive: false });
      const finish = () => {
        const current = swipe;
        swipe = null;
        if (!current?.dragging) return;
        if ((current.lastX || current.startX) - current.startX > 64) navigateBack();
      };
      surface.addEventListener("touchend", finish, { passive: true });
      surface.addEventListener("touchcancel", () => {
        swipe = null;
      }, { passive: true });
    }

    async function fetchPdfBlob() {
      const downloadUrl = downloadUrlFor(raw);
      if (!downloadUrl || downloadUrl === "#") throw new Error("No PDF URL is available.");
      const headers = key ? { "X-Hermes-Web-Key": key } : {};
      const res = await fetch(downloadUrl, { headers });
      if (!res.ok) throw new Error(`${res.status} ${res.statusText}`);
      return res.blob();
    }

    function preparePdfBlob() {
      if (!pdfBlobPromise) {
        pdfBlobPromise = fetchPdfBlob()
          .then((blob) => {
            cachedPdfBlob = blob;
            return blob;
          })
          .catch((err) => {
            pdfBlobPromise = null;
            throw err;
          });
      }
      return pdfBlobPromise;
    }

    async function preparePdfBytes() {
      const blob = await preparePdfBlob();
      const buffer = await blob.arrayBuffer();
      return new Uint8Array(buffer);
    }

    function isUserCancelledShare(err) {
      return String(err?.name || "").toLowerCase() === "aborterror";
    }

    function canShareFiles(files) {
      return Boolean(navigator.share && (!navigator.canShare || navigator.canShare({ files })));
    }

    async function sharePdf() {
      if (!raw) return;
      if (await openNativePdfOpenIn()) return;
      const downloadUrl = downloadUrlFor(raw);
      const shareUrl = absoluteUrlFor(downloadUrl);
      try {
        if (cachedPdfBlob) {
          const file = new File([cachedPdfBlob], name, { type: cachedPdfBlob.type || "application/pdf" });
          if (canShareFiles([file])) {
            await navigator.share({ files: [file], title: name });
            setTransientStatus("");
            return;
          }
        } else {
          preparePdfBlob().catch(() => {});
        }
        if (navigator.share && shareUrl) {
          await navigator.share({ title: name, url: shareUrl });
          setTransientStatus("");
          return;
        }
        if (!cachedPdfBlob) {
          setTransientStatus("PDF 还在准备，已先打开原文件。");
          location.href = downloadUrl;
          return;
        }
        const cachedFile = new File([cachedPdfBlob], name, { type: cachedPdfBlob.type || "application/pdf" });
        if (canShareFiles([cachedFile])) {
          await navigator.share({ files: [cachedFile], title: name });
          setTransientStatus("");
          return;
        }
        downloadBlob(cachedPdfBlob, name);
        setTransientStatus("此浏览器不支持系统分享，已保存 PDF。");
        return;
      } catch (err) {
        if (isUserCancelledShare(err)) return;
        setTransientStatus("系统分享不可用，已打开原文件。");
        location.href = downloadUrl;
        return;
      }
      setTransientStatus("准备 PDF...");
      try {
        const blob = await fetchPdfBlob();
        const file = new File([blob], name, { type: blob.type || "application/pdf" });
        if (navigator.canShare?.({ files: [file] }) && navigator.share) {
          await navigator.share({ files: [file], title: name });
          setTransientStatus("");
          return;
        }
        downloadBlob(blob, name);
        setTransientStatus("此浏览器不支持系统分享，已保存 PDF。");
      } catch (err) {
        setTransientStatus(err.message || "无法分享此 PDF。");
      }
    }

    function switchPreviewMode() {
      if (!raw) return;
      if (waitForNativePdfPreview({
        onFailure: () => location.assign(originalUrlFor(raw)),
      })) return;
      location.assign(originalUrlFor(raw));
    }

    function viewportWidth() {
      const scrollWidth = Math.floor(document.getElementById("pdfScroll")?.clientWidth || 0);
      const layoutWidth = Math.floor(document.documentElement.clientWidth || window.innerWidth || 0);
      const visualWidth = Math.floor(window.visualViewport?.width || 0);
      return Math.max(320, scrollWidth || layoutWidth || visualWidth || 0);
    }

    function pdfDeviceClass(width = viewportWidth()) {
      const coarsePointer = window.matchMedia?.("(pointer: coarse)")?.matches;
      if (coarsePointer && width <= 540) return "phone";
      if (coarsePointer && width <= 900) return "tablet";
      return "desktop";
    }

    function readablePdfCssWidth(page, width) {
      const unitViewport = page.getViewport({ scale: 1 });
      const portrait = unitViewport.height >= unitViewport.width;
      const deviceClass = pdfDeviceClass(width);
      if (embedded && deviceClass === "phone") return width;
      if (deviceClass === "phone") {
        const multiplier = portrait ? (width <= 430 ? 1.46 : 1.38) : 1.16;
        return Math.min(860, Math.round(width * multiplier));
      }
      if (deviceClass === "tablet") {
        return Math.min(980, Math.round(width * 1.12));
      }
      return width;
    }

    function renderMetricsForPage(page, width) {
      const unitViewport = page.getViewport({ scale: 1 });
      const readableWidth = readablePdfCssWidth(page, width);
      const cssScale = readableWidth / unitViewport.width;
      const cssViewport = page.getViewport({ scale: cssScale });
      const targetPixelRatio = Math.min(Math.max(window.devicePixelRatio || 1, 1), isAndroid ? 2 : 3);
      const maxPixels = isAndroid ? 5000000 : 12000000;
      let outputScale = targetPixelRatio;
      const pixels = cssViewport.width * cssViewport.height * outputScale * outputScale;
      if (pixels > maxPixels) {
        outputScale *= Math.sqrt(maxPixels / pixels);
      }
      return { cssViewport, outputScale };
    }

    async function loadPdfDocumentFromBlob() {
      const options = { data: await preparePdfBytes(), disableWorker: isAndroid };
      return pdfjsLib.getDocument(options).promise;
    }

    async function renderPdf() {
      if (!pdfDocument) return;
      const serial = ++renderSerial;
      const width = viewportWidth();
      const fragment = document.createDocumentFragment();
      let renderedPages = 0;

      document.documentElement.dataset.pdfStatus = "rendering";
      setStatus("Rendering PDF...");
      for (let pageNumber = 1; pageNumber <= pdfDocument.numPages; pageNumber += 1) {
        if (serial !== renderSerial) return;
        try {
          const page = await pdfDocument.getPage(pageNumber);
          const { cssViewport, outputScale } = renderMetricsForPage(page, width);
          const canvas = document.createElement("canvas");
          const context = canvas.getContext("2d", { alpha: false });
          if (!context) throw new Error("Canvas is not available.");

          canvas.width = Math.ceil(cssViewport.width * outputScale);
          canvas.height = Math.ceil(cssViewport.height * outputScale);
          canvas.style.width = `${Math.ceil(cssViewport.width)}px`;
          canvas.style.height = `${Math.ceil(cssViewport.height)}px`;
          canvas.dataset.pixelRatio = outputScale.toFixed(2);
          canvas.dataset.pdfPage = String(pageNumber);
          fragment.append(canvas);

          context.fillStyle = pdfCanvasBackground;
          context.fillRect(0, 0, canvas.width, canvas.height);
          const transform = outputScale === 1 ? null : [outputScale, 0, 0, outputScale, 0, 0];
          await page.render({ canvasContext: context, viewport: cssViewport, transform, background: pdfCanvasBackground }).promise;
          renderedPages += 1;
        } catch (err) {
          const errorBox = document.createElement("div");
          errorBox.className = "pdf-page-error";
          errorBox.textContent = `Page ${pageNumber} preview failed.`;
          fragment.append(errorBox);
        }
      }

      if (serial !== renderSerial) return;
      pages.replaceChildren(fragment);
      document.documentElement.dataset.pdfStatus = renderedPages > 0 ? "rendered" : "error";
      document.documentElement.dataset.pdfRenderedPages = String(renderedPages);
      setStatus("");
    }

    async function loadPdf() {
      try {
        document.documentElement.dataset.pdfStatus = "loading";
        document.documentElement.dataset.pdfRenderedPages = "0";
        pdfDocument = await loadPdfDocumentFromBlob();
        await renderPdf();
      } catch (err) {
        showFallback("PDF preview failed.", raw);
      }
    }

    window.addEventListener("resize", () => {
      window.clearTimeout(resizeTimer);
      resizeTimer = window.setTimeout(() => renderPdf(), 180);
    });

    document.getElementById("backButton").href = fallbackReturnUrl();
    document.getElementById("backButton").addEventListener("click", navigateBack);
    document.getElementById("shareButton").addEventListener("click", sharePdf);
    document.getElementById("previewModeToggle").addEventListener("click", switchPreviewMode);
    if (!embedded) wireViewerBackGuard();
    wireViewerBackSwipe(document.getElementById("pdfScroll"));

    if (
      !raw
      || !waitForNativePdfPreview({
        onFailure: (error) => {
          if (nativeDocumentBridgeExpected()) {
            showNativePdfPreviewFailure(error);
            return;
          }
          loadPdf();
        },
      })
    ) {
      loadPdf();
    }
  </script>
</body>
</html>
